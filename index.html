<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>North Straits Salish Orthography Translator</title>
  
  <!-- Noto Sans Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  
  <!-- External Stylesheet -->
  <link rel="stylesheet" href="web/style.css">
</head>
<body>

  <div class="app-container">
    <header>
      <h1>North Straits Salish Translator</h1>
      <p>Translate text between various North Straits Salish orthographies</p>
    </header>

    <div class="translator-grid">
      <!-- Input Panel -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-label">Source Orthography</span>
        </div>
        <div class="select-wrapper">
          <select id="inputOrtho" aria-label="Select source orthography">
            <option value="SEN" selected>SENĆOŦEN</option>
            <option value="LEK-S">Songhees Lək̓ʷəŋən</option>
            <option value="XWL">Xwlemi Chosen</option>
            <option value="XWS">Xws7ameshqen</option>
            <option value="LEK-K">Xʷsepsəm Lək̓ʷəŋən</option>
          </select>
        </div>
        <div class="textarea-wrapper">
          <textarea id="inputText" placeholder="Type or paste text to translate..." autocomplete="off" spellcheck="false"></textarea>
          <button id="clearInput" class="overlay-btn clear-btn" aria-label="Clear input text">
            <!-- Close icon SVG -->
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
      </div>

      <!-- Swap Button Container (positioned absolute on desktop) -->
      <div class="swap-btn-container">
        <button id="swapBtn" class="swap-circle-btn" aria-label="Swap orthographies">
          <!-- Swap arrows icon SVG -->
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 8 16 13"></polyline><line x1="21" y1="8" x2="9" y2="8"></line><polyline points="8 21 3 16 8 11"></polyline><line x1="3" y1="16" x2="15" y2="16"></line></svg>
        </button>
      </div>

      <!-- Output Panel -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-label">Target Orthography</span>
        </div>
        <div class="select-wrapper">
          <select id="outputOrtho" aria-label="Select target orthography">
            <option value="SEN">SENĆOŦEN</option>
            <option value="LEK-S">Songhees Lək̓ʷəŋən</option>
            <option value="XWL">Xwlemi Chosen</option>
            <option value="XWS">Xws7ameshqen</option>
            <option value="LEK-K" selected>Xʷsepsəm Lək̓ʷəŋən</option>
          </select>
        </div>
        <div class="textarea-wrapper">
          <textarea id="outputText" readonly placeholder="Translation will appear here..." autocomplete="off" spellcheck="false"></textarea>
          <button id="copyOutput" class="overlay-btn copy-btn" aria-label="Copy translated text">
            <!-- Copy icon SVG -->
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          </button>
        </div>
      </div>
    </div>

  </div>

  <div id="copyToast" class="toast">Copied to clipboard!</div>

  <footer class="footer-credit">
    North Straits Salish Orthography Translator &copy; 2026
  </footer>

  <script>
    // Declare a mock module object so mapper.js can execute in the browser without modification
    var module = { exports: {} };
  </script>
  <script src="lib/mapper.js"></script>
  <script src="web/app.js"></script>
</body>
</html>
